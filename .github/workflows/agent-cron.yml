name: Agent Daily Scan

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Switch schema to PostgreSQL
        run: node scripts/switch-to-postgresql.mjs

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify DB connection
        run: |
          node -e "
          const url = process.env.DATABASE_URL || '';
          console.log('DATABASE_URL host:', url.replace(/\/\/[^:]+:[^@]+@/, '//***:***@'));
          console.log('DIRECT_URL set:', !!process.env.DIRECT_URL);
          console.log('DEEPSEEK_API_KEY set:', !!process.env.DEEPSEEK_API_KEY);
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Run agent
        run: npm run agent:cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
